{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Login | Wellness Sistema LEO{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Oswald:wght@700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Degradado en Azul Marino Profundo */
            background: radial-gradient(circle at top right, #001d3d, #000814);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .login-logo {
            font-family: 'Oswald', sans-serif;
            font-weight: 700;
            letter-spacing: -1px;
            font-size: 2.2rem;
            color: #000814;
        }

        .login-sub {
            font-size: 0.8rem;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
            color: #001d3d;
        }

        .form-control {
            border-left: none;
            padding: 12px;
            font-size: 0.95rem;
        }

        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }

        .btn-leo {
            background: #001d3d;
            border: none;
            padding: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-leo:hover {
            background: #003566;
            transform: translateY(-2px);
        }

        .brand-dot {
            color: #4dabf7; /* El azul claro de acento */
        }
    </style>
</head>
<body>

    {% block content %}{% endblock %}

</body>
</html>
