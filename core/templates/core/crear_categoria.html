{% extends 'core/base.html' %}

{% block title %}Nueva Categoría{% endblock %}

{% block content %}

<!-- HEADER -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-0 fw-semibold">Nueva categoría</h4>
        <small class="text-muted">
            Registro de una nueva categoría de productos
        </small>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">

        <form method="post" class="card shadow-sm border-0">
            {% csrf_token %}

            <div class="card-body">

                <h6 class="fw-semibold mb-3 text-uppercase text-secondary small">
                    Información de la categoría
                </h6>

                <!-- NOMBRE -->
                <div class="mb-3">
                    <label class="form-label small text-muted">Nombre</label>
                    <input name="nombre"
                           class="form-control form-control-sm"
                           placeholder="Ej: Polos deportivos"
                           required>
                </div>

            </div>

            <!-- FOOTER -->
            <div class="card-footer bg-white border-0 d-flex justify-content-end gap-2">

                <a href="{% url 'categorias' %}"
                   class="btn btn-light btn-sm rounded-pill px-3">
                    Cancelar
                </a>

                <button type="button"
                        class="btn btn-success btn-sm rounded-pill px-4"
                        data-bs-toggle="modal"
                        data-bs-target="#confirmarModal">
                    <i class="bi bi-check-lg me-1"></i> Guardar
                </button>

            </div>

            <!-- MODAL CONFIRMACIÓN -->
            <div class="modal fade" id="confirmarModal" tabindex="-1">
                <div class="modal-dialog modal-dialog-centered">
                    <div class="modal-content border-0 shadow-sm">

                        <div class="modal-header">
                            <h6 class="modal-title fw-semibold">
                                Confirmar creación
                            </h6>
                            <button type="button"
                                    class="btn-close"
                                    data-bs-dismiss="modal">
                            </button>
                        </div>

                        <div class="modal-body">
                            ¿Deseas crear esta categoría?
                        </div>

                        <div class="modal-footer">
                            <button type="button"
                                    class="btn btn-light btn-sm"
                                    data-bs-dismiss="modal">
                                Cancelar
                            </button>

                            <button type="submit"
                                    class="btn btn-success btn-sm">
                                Sí, crear
                            </button>
                        </div>

                    </div>
                </div>
            </div>

        </form>

    </div>
</div>

{% endblock %}
