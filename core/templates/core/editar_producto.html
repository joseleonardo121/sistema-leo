{% extends 'core/base.html' %}

{% block title %}Editar Producto | {{ producto.codigo }}{% endblock %}

{% block content %}

<div class="container-fluid py-2">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="fw-bold text-dark mb-1">
                <i class="bi bi-pencil-square text-primary me-2"></i>Editar Producto
            </h4>
            <p class="text-muted small mb-0">Modificando: <strong>{{ producto.codigo }}</strong></p>
        </div>

        <a href="{% url 'productos' %}" class="btn btn-light border shadow-sm rounded-3">
            <i class="bi bi-arrow-left me-1"></i> Volver al listado
        </a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="card-header bg-white py-3 border-bottom">
            <h6 class="mb-0 fw-bold text-muted"><i class="bi bi-info-circle me-2"></i>Información General</h6>
        </div>
        
        <div class="card-body p-4">
            <form method="post" class="row g-4">
                {% csrf_token %}

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Código de Barras</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="bi bi-barcode text-primary"></i></span>
                        <input type="text" name="codigo" class="form-control border-0 bg-light py-2"
                               value="{{ producto.codigo }}" required>
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Categoría</label>
                    <select name="categoria" class="form-select border-0 bg-light py-2" required>
                        {% for c in categorias %}
                        <option value="{{ c.id }}"
                            {% if producto.categoria_id == c.id %}selected{% endif %}>
                            {{ c.nombre }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Marca</label>
                    <input type="text" name="marca" class="form-control border-0 bg-light py-2"
                           value="{{ producto.marca }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Diseño / Modelo</label>
                    <input type="text" name="diseno" class="form-control border-0 bg-light py-2"
                           value="{{ producto.diseno }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Color</label>
                    <input type="text" name="color" class="form-control border-0 bg-light py-2"
                           value="{{ producto.color }}">
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Talla</label>
                    <input type="text" name="talla" class="form-control border-0 bg-light py-2"
                           value="{{ producto.talla }}">
                </div>

                <div class="col-12 mt-4 pt-2 border-top">
                    <h6 class="fw-bold text-muted mb-3"><i class="bi bi-cash-stack me-2"></i>Gestión de Costos</h6>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Costo de Compra</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 fw-bold">S/</span>
                        <input type="number" step="0.01" name="costo"
                               class="form-control border-0 bg-light py-2 fw-bold text-danger" 
                               value="{{ costo_formateado }}">
                    </div>
                </div>

                <div class="col-md-4">
                    <label class="form-label small fw-bold text-uppercase text-muted">Precio de Venta</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 fw-bold">S/</span>
                        <input type="number" step="0.01" name="precio"
                               class="form-control border-0 bg-light py-2 fw-bold text-success" 
                               value="{{ precio_formateado }}">
                    </div>
                </div>

                <div class="col-md-4 d-flex align-items-end justify-content-end">
                    <button type="submit" class="btn btn-primary btn-lg w-100 rounded-3 fw-bold shadow-sm">
                        <i class="bi bi-save2 me-2"></i> Guardar Cambios
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Estilos para inputs modernos */
    .form-control:focus, .form-select:focus {
        background-color: #fff !important;
        box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1) !important;
        border: 1px solid #4f46e5 !important;
    }

    .input-group-text {
        color: #6c757d;
        border-right: 0;
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
    }
</style>

{% endblock %}
